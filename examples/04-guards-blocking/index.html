<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Guards & Blocking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    /* ==============================
       APP CONTAINER
    ============================== */

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;

      width: 100%;
      max-width: 480px;
      margin: 0 auto;

      background: white;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
    }

    @media (max-width: 480px) {
      .app { border: none; }
    }

    /* ==============================
       HEADER
    ============================== */

    header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
    }

    /* ==============================
       CONTENT
    ============================== */

    #view {
      flex: 1;
      padding: 20px;
    }

    h2 { margin-top: 0; }

    p {
      color: #555;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
      padding: 10px;
      font-family: inherit;
      font-size: 14px;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: #666;
    }

    .status span {
      font-weight: bold;
    }

    /* ==============================
       NAV
    ============================== */

    nav {
      display: flex;
      border-top: 1px solid #ddd;
      background: white;
    }

    nav a {
      flex: 1;
      text-align: center;
      padding: 12px;
      text-decoration: none;
      color: #333;
      cursor: pointer;
      font-size: 14px;
    }

    nav a.active {
      background: #f0f0f0;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <h1>Guards & Blocking</h1>
    </header>

    <div id="view"></div>

    <nav>
      <a href="/" data-link>Home</a>
      <a href="/form" data-link>Form</a>
      <a href="/about" data-link>About</a>
    </nav>
  </div>

  <script src="/src/index.js"></script>
  <script>
    const view = document.getElementById("view");

    history.config({
      base: "/examples/04-guards-blocking",
      mode: "history"
    });

    // ==============================
    // LINK INTERCEPTION
    // ==============================

    document.addEventListener("click", (e) => {
      const a = e.target.closest("[data-link]");
      if (!a) return;

      const url = new URL(a.href);
      if (url.origin !== location.origin) return;

      e.preventDefault();
      history.navigatePush(url.pathname + url.search);
    });

    // ==============================
    // UI HELPERS
    // ==============================

    function setActive(path) {
      document.querySelectorAll("nav a").forEach(a => {
        a.classList.toggle("active", a.getAttribute("href") === path);
      });
    }

    // ==============================
    // STATE
    // ==============================

    let isDirty = false;

    // ==============================
    // ROUTES
    // ==============================

    history.router("/", {
      onMeet() {
        setActive("/");

        view.innerHTML = `
          <h2>Home</h2>
          <p>This is a normal page.</p>
        `;
      }
    });

    history.router("/about", {
      onMeet() {
        setActive("/about");

        view.innerHTML = `
          <h2>About</h2>
          <p>This page is safe to leave.</p>
        `;
      }
    });

    history.router("/form", {
      onMeet() {
        setActive("/form");

        view.innerHTML = `
          <h2>Form Page</h2>
          <p>Type something and try navigating away.</p>

          <textarea id="input" placeholder="Type something..."></textarea>

          <div class="status">
            Status: <span id="status">clean</span>
          </div>
        `;

        const input = document.getElementById("input");
        const status = document.getElementById("status");

        input.oninput = () => {
          isDirty = true;
          status.textContent = "dirty (unsaved)";
        };
      },

      // ==============================
      // GUARD
      // ==============================

      canLeave(ctx) {
        if (!isDirty) return true;

        const confirmLeave = confirm(
          "You have unsaved changes. Leave anyway?"
        );

        if (confirmLeave) {
          isDirty = false;
          return true;
        }

        return false;
      },

      onExit() {
        isDirty = false;
      }
    });

    // ==============================
    // INITIAL
    // ==============================

    history.navigateReplace(location.pathname + location.search);
  </script>
</body>
</html>
