<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dynamic Params</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    a { display: inline-block; margin-right: 10px; color: blue; cursor: pointer; }
    #view { margin-top: 20px; }
  </style>
</head>
<body>

  <h1>Dynamic Params</h1>

  <nav>
    <a href="/user/1" data-link>User 1</a>
    <a href="/user/2" data-link>User 2</a>
    <a href="/user/42" data-link>User 42</a>
  </nav>

  <div id="view"></div>

  <script src="../../src/index.js"></script>
  <script>
    const view = document.getElementById("view");

    // ==============================
    // CONFIG
    // ==============================

    history.config({
      base: "/examples/02-dynamic-params",
      mode: "history"
    });

    // ==============================
    // LINK INTERCEPTION
    // ==============================

    document.addEventListener("click", (e) => {
      const a = e.target.closest("[data-link]");
      if (!a) return;

      const url = new URL(a.href);

      if (url.origin !== location.origin) return;

      e.preventDefault();
      history.navigatePush(url.pathname + url.search);
    });

    // ==============================
    // ROUTES
    // ==============================

    /**
     * Dynamic route
     *
     * Example:
     *   /user/1 → ctx.params.id = "1"
     */
    history.router("/user/:id", {
      onMeet(ctx) {
        const { id } = ctx.params;

        view.innerHTML = `
          <h2>User ${id}</h2>
          <p>This page is rendered using a dynamic route.</p>

          <button id="next">Go to next user</button>
        `;

        // Example: programmatic navigation using params
        document.getElementById("next").onclick = () => {
          const nextId = Number(id) + 1;
          history.navigatePush(`/user/${nextId}`);
        };
      }
    });

    /**
     * Optional root route
     * (helps when landing on base path)
     */
    history.router("/", {
      onMeet() {
        view.innerHTML = `
          <h2>Welcome</h2>
          <p>Select a user to begin.</p>
        `;
      }
    });

    // ==============================
    // INITIAL SYNC
    // ==============================

    history.navigateReplace(location.pathname + location.search);
  </script>
</body>
</html>
