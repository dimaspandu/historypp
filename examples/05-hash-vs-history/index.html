<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hash vs History Mode</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
    }

    .controls {
      margin-top: 10px;
    }

    .controls button {
      margin-right: 8px;
      padding: 6px 10px;
      cursor: pointer;
    }

    #view {
      flex: 1;
      padding: 20px;
    }

    nav {
      border-top: 1px solid #ddd;
      display: flex;
    }

    nav button {
      flex: 1;
      padding: 12px;
      border: none;
      background: white;
      cursor: pointer;
    }

    nav button.active {
      background: #f0f0f0;
      font-weight: bold;
    }

    .info {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
      word-break: break-all;
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <h3>Hash vs History</h3>

      <div class="controls">
        <button id="historyBtn">History Mode</button>
        <button id="hashBtn">Hash Mode</button>
      </div>

      <div class="info" id="modeInfo"></div>
      <div class="info" id="urlInfo"></div>
    </header>

    <div id="view"></div>

    <nav>
      <button data-link="/">Home</button>
      <button data-link="/about">About</button>
      <button data-link="/profile">Profile</button>
    </nav>
  </div>

  <script src="../../src/index.js"></script>
  <script>
    const view = document.getElementById("view");
    const modeInfo = document.getElementById("modeInfo");
    const urlInfo = document.getElementById("urlInfo");

    let currentMode = "history";

    function updateInfo() {
      modeInfo.textContent = "Mode: " + currentMode;
      urlInfo.textContent = "URL: " + location.href;
    }

    function setMode(mode) {
      currentMode = mode;

      history.config({
        base: "/examples/05-hash-vs-history",
        mode
      });

      // re-run router with new mode
      history.navigateReplace(getCurrentPathSafe());
      updateInfo();
    }

    function getCurrentPathSafe() {
      if (currentMode === "hash") {
        return location.hash.replace(/^#/, "") || "/";
      }
      return location.pathname + location.search;
    }

    // ==============================
    // NAVIGATION
    // ==============================

    document.querySelectorAll("nav button").forEach(btn => {
      btn.onclick = () => {
        const path = btn.dataset.link;
        history.navigatePush(path);
        updateInfo();
      };
    });

    function setActive(path) {
      document.querySelectorAll("nav button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.link === path);
      });
    }

    function render(title) {
      view.innerHTML = `
        <h2>${title}</h2>
        <p>Try switching modes and navigating.</p>

        <div class="info">
          - History mode uses clean URLs<br/>
          - Hash mode uses # and works without server<br/>
          - Reload behavior differs
        </div>
      `;
    }

    // ==============================
    // ROUTES
    // ==============================

    history.router("/", {
      onMeet(ctx) {
        setActive("/");
        render("Home");
      }
    });

    history.router("/about", {
      onMeet(ctx) {
        setActive("/about");
        render("About");
      }
    });

    history.router("/profile", {
      onMeet(ctx) {
        setActive("/profile");
        render("Profile");
      }
    });

    // ==============================
    // MODE SWITCH BUTTONS
    // ==============================

    document.getElementById("historyBtn").onclick = () => {
      setMode("history");
    };

    document.getElementById("hashBtn").onclick = () => {
      setMode("hash");
    };

    // ==============================
    // INITIAL
    // ==============================

    history.config({
      base: "/examples/05-hash-vs-history",
      mode: "history"
    });

    history.navigateReplace(location.pathname);
    updateInfo();
  </script>
</body>
</html>
