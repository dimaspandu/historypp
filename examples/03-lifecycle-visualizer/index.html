<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lifecycle Visualizer (Full)</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }

    nav a {
      margin-right: 10px;
      color: blue;
      cursor: pointer;
    }

    #log {
      margin-top: 20px;
      padding: 12px;
      border: 1px solid #ddd;
      height: 260px;
      overflow-y: auto;
      background: #fafafa;
      font-family: monospace;
      font-size: 13px;
    }

    .item { margin-bottom: 6px; }

    .time { color: #999; margin-right: 6px; }

    .route { font-weight: bold; }

    /* lifecycle colors */
    .onMeet { color: #2e7d32; }
    .onArrive { color: #1565c0; }
    .onExit { color: #c62828; }
    .onReturn { color: #ef6c00; }
    .onComeback { color: #6a1b9a; }

    .type {
      margin-left: 6px;
      color: #555;
      font-size: 11px;
    }

    .controls {
      margin-top: 10px;
    }

    button {
      margin-right: 6px;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Lifecycle Visualizer (Full)</h1>

  <nav>
    <a href="/" data-link>Home</a>
    <a href="/about" data-link>About</a>
    <a href="/contact" data-link>Contact</a>
  </nav>

  <div class="controls">
    <button id="clear">Clear Log</button>
  </div>

  <div id="log"></div>

  <script src="../../src/index.js"></script>
  <script>
    const logEl = document.getElementById("log");
    const clearBtn = document.getElementById("clear");

    // ==============================
    // CONFIG
    // ==============================

    history.config({
      base: "/examples/03-lifecycle-visualizer",
      mode: "history"
    });

    // ==============================
    // LOGGER (timeline)
    // ==============================

    let step = 0;

    function now() {
      return new Date().toLocaleTimeString();
    }

    function log(route, hook, ctx) {
      step++;

      const el = document.createElement("div");
      el.className = "item";

      el.innerHTML = `
        <span class="time">#${step} ${now()}</span>
        <span class="route">${route}</span>
        →
        <span class="${hook}">${hook}</span>
        <span class="type">(type: ${ctx.type})</span>
      `;

      logEl.appendChild(el);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      logEl.innerHTML = "";
      step = 0;
    }

    clearBtn.onclick = clearLog;

    // ==============================
    // LINK INTERCEPTION
    // ==============================

    document.addEventListener("click", (e) => {
      const a = e.target.closest("[data-link]");
      if (!a) return;

      const url = new URL(a.href);
      if (url.origin !== location.origin) return;

      e.preventDefault();
      history.navigatePush(url.pathname + url.search);
    });

    // ==============================
    // ROUTE FACTORY
    // ==============================

    function createRoute(name) {
      return {
        onArrive(ctx) {
          log(name, "onArrive", ctx);
        },
        onMeet(ctx) {
          log(name, "onMeet", ctx);
        },
        onExit(ctx) {
          log(name, "onExit", ctx);
        },
        onReturn(ctx) {
          log(name, "onReturn", ctx);
        },
        onComeback(ctx) {
          log(name, "onComeback", ctx);
        }
      };
    }

    // ==============================
    // ROUTES
    // ==============================

    history.router("/", createRoute("Home"));
    history.router("/about", createRoute("About"));
    history.router("/contact", createRoute("Contact"));

    // ==============================
    // INITIAL SYNC
    // ==============================

    clearLog();
    history.navigateReplace(location.pathname + location.search);
  </script>
</body>
</html>
