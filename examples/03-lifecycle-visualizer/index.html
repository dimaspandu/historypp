<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lifecycle Visualizer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    /* ==============================
       APP CONTAINER
    ============================== */

    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;

      width: 100%;
      max-width: 480px;
      margin: 0 auto;

      background: white;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
    }

    @media (max-width: 480px) {
      .app { border: none; }
    }

    /* ==============================
       HEADER
    ============================== */

    header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      margin: 0;
      font-size: 18px;
    }

    /* ==============================
       NAV
    ============================== */

    nav {
      display: flex;
      border-bottom: 1px solid #ddd;
    }

    nav a {
      flex: 1;
      text-align: center;
      padding: 12px;
      text-decoration: none;
      color: #333;
      cursor: pointer;
      font-size: 14px;
    }

    nav a.active {
      background: #f0f0f0;
      font-weight: bold;
    }

    /* ==============================
       CONTROLS
    ============================== */

    .controls {
      padding: 10px 16px;
      border-bottom: 1px solid #eee;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    /* ==============================
       LOG VIEW
    ============================== */

    #log {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      background: #fafafa;
      font-family: monospace;
      font-size: 12px;
    }

    .item {
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .time { color: #999; margin-right: 6px; }
    .route { font-weight: bold; }

    /* lifecycle colors */
    .onMeet { color: #2e7d32; }
    .onArrive { color: #1565c0; }
    .onExit { color: #c62828; }
    .onReturn { color: #ef6c00; }
    .onComeback { color: #6a1b9a; }

    .type {
      margin-left: 6px;
      color: #555;
      font-size: 11px;
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <h1>Lifecycle Visualizer</h1>
    </header>

    <nav>
      <a href="/" data-link>Home</a>
      <a href="/about" data-link>About</a>
      <a href="/contact" data-link>Contact</a>
    </nav>

    <div class="controls">
      <button id="clear">Clear Log</button>
    </div>

    <div id="log"></div>
  </div>

  <script type="module" src="/src/index.js"></script>
  <script type="module">
    const logEl = document.getElementById("log");
    const clearBtn = document.getElementById("clear");

    history.config({
      base: "/examples/03-lifecycle-visualizer",
      mode: "history"
    });

    // ==============================
    // ACTIVE NAV
    // ==============================

    function setActive(path) {
      document.querySelectorAll("nav a").forEach(a => {
        a.classList.toggle("active", a.getAttribute("href") === path);
      });
    }

    // ==============================
    // LOGGER
    // ==============================

    let step = 0;

    function now() {
      return new Date().toLocaleTimeString();
    }

    function log(route, hook, ctx) {
      step++;

      const el = document.createElement("div");
      el.className = "item";

      el.innerHTML = `
        <span class="time">#${step} ${now()}</span>
        <span class="route">${route}</span>
        →
        <span class="${hook}">${hook}</span>
        <span class="type">(type: ${ctx.type})</span>
      `;

      logEl.appendChild(el);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function clearLog() {
      logEl.innerHTML = "";
      step = 0;
    }

    clearBtn.onclick = clearLog;

    // ==============================
    // LINK INTERCEPTION
    // ==============================

    document.addEventListener("click", (e) => {
      const a = e.target.closest("[data-link]");
      if (!a) return;

      const url = new URL(a.href);
      if (url.origin !== location.origin) return;

      e.preventDefault();
      history.navigatePush(url.pathname + url.search);
    });

    // ==============================
    // ROUTE FACTORY
    // ==============================

    function createRoute(name, path) {
      return {
        onArrive(ctx) {
          log(name, "onArrive", ctx);
        },
        onMeet(ctx) {
          setActive(path);
          log(name, "onMeet", ctx);
        },
        onExit(ctx) {
          log(name, "onExit", ctx);
        },
        onReturn(ctx) {
          log(name, "onReturn", ctx);
        },
        onComeback(ctx) {
          setActive(path);
          log(name, "onComeback", ctx);
        }
      };
    }

    // ==============================
    // ROUTES
    // ==============================

    history.router("/", createRoute("Home", "/"));
    history.router("/about", createRoute("About", "/about"));
    history.router("/contact", createRoute("Contact", "/contact"));

    // ==============================
    // INITIAL
    // ==============================

    clearLog();
    history.navigateReplace(location.pathname + location.search);
  </script>
</body>
</html>
