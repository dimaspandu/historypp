<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>HTML Fetch Navigation</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    /* ==============================
       APP CONTAINER
    ============================== */

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;

      width: 100%;
      max-width: 480px;
      margin: 0 auto;

      background: white;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
    }

    @media (max-width: 480px) {
      .app { border: none; }
    }

    /* ==============================
       HEADER
    ============================== */

    header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
    }

    /* ==============================
       VIEW
    ============================== */

    #view {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    /* ==============================
       NAV
    ============================== */

    nav {
      display: flex;
      border-top: 1px solid #ddd;
      background: white;
    }

    nav a {
      flex: 1;
      text-align: center;
      padding: 12px;
      text-decoration: none;
      color: #333;
      font-size: 14px;
    }

    nav a.active {
      background: #f0f0f0;
      font-weight: bold;
    }

    /* ==============================
       LOADING + ERROR
    ============================== */

    .loading,
    .error {
      font-size: 14px;
      color: #666;
    }

    .error {
      color: #c62828;
    }
  </style>
</head>
<body>

<div class="app">
  <header>
    <h3>HTML Fetch Navigation</h3>
  </header>

  <div id="view"></div>

  <nav>
    <a href="/" data-link>Home</a>
    <a href="/about" data-link>About</a>
    <a href="/contact" data-link>Contact</a>
  </nav>
</div>

<script src="../../src/index.js"></script>
<script>
  const view = document.getElementById("view");

  // ==============================
  // CONFIG
  // ==============================

  const BASE = "/examples/12-html-fetch-navigation";

  history.config({
    base: BASE,
    mode: "history"
  });

  // ==============================
  // LINK INTERCEPTION
  // ==============================

  document.addEventListener("click", (e) => {
    const link = e.target.closest("[data-link]");
    if (!link) return;

    const url = new URL(link.href);

    if (url.origin !== location.origin) return;

    e.preventDefault();
    history.navigatePush(url.pathname);
  });

  // ==============================
  // HELPERS
  // ==============================

  function setActive(path) {
    document.querySelectorAll("nav a").forEach(a => {
      a.classList.toggle("active", a.getAttribute("href") === path);
    });
  }

  function renderLoading() {
    view.innerHTML = `<p class="loading">Loading...</p>`;
  }

  function renderError(message = "Failed to load content") {
    view.innerHTML = `<p class="error">${message}</p>`;
  }

  function resolveView(path) {
    return path === "/"
      ? `${BASE}/views/home.html`
      : `${BASE}/views${path}.html`;
  }

  async function loadHTML(path) {
    renderLoading();

    try {
      const res = await fetch(resolveView(path));

      if (!res.ok) {
        renderError();
        return;
      }

      const html = await res.text();

      // Parse fragment safely
      const temp = document.createElement("div");
      temp.innerHTML = html;

      const root = temp.firstElementChild;

      // Title sync (if provided)
      const title = root?.dataset?.title;
      if (title) {
        document.title = title;
      }

      view.innerHTML = html;

    } catch (err) {
      console.error(err);
      renderError("Network error");
    }
  }

  // ==============================
  // ROUTES
  // ==============================

  history.router("/", {
    async onMeet() {
      setActive("/");
      await loadHTML("/");
    }
  });

  history.router("/about", {
    async onMeet() {
      setActive("/about");
      await loadHTML("/about");
    }
  });

  history.router("/contact", {
    async onMeet() {
      setActive("/contact");
      await loadHTML("/contact");
    }
  });

  // ==============================
  // INITIAL SYNC
  // ==============================

  history.navigateReplace(location.pathname + location.search);
</script>

</body>
</html>
