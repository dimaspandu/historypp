<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Middleware</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
    }

    #view {
      flex: 1;
      padding: 20px;
    }

    button {
      padding: 10px 14px;
      margin-top: 10px;
      cursor: pointer;
    }

    .log {
      font-size: 12px;
      background: #fafafa;
      border: 1px solid #eee;
      padding: 10px;
      margin-top: 10px;
      height: 120px;
      overflow: auto;
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <h3>Middleware</h3>
    </header>

    <div id="view"></div>
  </div>

  <script type="module" src="/src/index.js"></script>
  <script type="module">
    const view = document.getElementById("view");

    history.config({
      base: "/examples/10-middleware"
    });

    // ==============================
    // LOG SYSTEM
    // ==============================

    let logs = [];

    function log(msg) {
      logs.push(msg);
      updateLogView(); // update ONLY log, not full UI
    }

    function logView() {
      return `<div class="log">${logs.join("<br/>")}</div>`;
    }

    function updateLogView() {
      const el = document.querySelector(".log");
      if (el) {
        el.innerHTML = logs.join("<br/>");
      }
    }

    // ==============================
    // MIDDLEWARES
    // ==============================

    // Logger
    history.use((ctx, next) => {
      log("→ before: " + (ctx.from || "-") + " → " + ctx.to);

      next();

      log("← after: " + ctx.to);
    });

    // Auth middleware
    let isLoggedIn = false;

    history.use((ctx, next) => {
      if (ctx.to === "/private" && !isLoggedIn) {
        log("Blocked: not authenticated");

        history.navigateReplace("/login");
        return;
      }

      next();
    });

    // ==============================
    // ROUTES
    // ==============================

    history.router("/", {
      onMeet() {
        render("Home");
      }
    });

    history.router("/about", {
      onMeet() {
        render("About");
      }
    });

    history.router("/private", {
      onMeet() {
        render("Private Page (Protected)");
      }
    });

    history.router("/login", {
      onMeet() {
        view.innerHTML = `
          <h2>Login</h2>

          <button id="login">Login</button>
          <button onclick="history.navigatePush('/')">Cancel</button>

          ${logView()}
        `;

        document.getElementById("login").onclick = () => {
          isLoggedIn = true;
          history.navigateReplace("/private");
        };
      }
    });

    // ==============================
    // RENDER
    // ==============================

    function render(title = "") {
      view.innerHTML = `
        <h2>${title}</h2>

        <button onclick="history.navigatePush('/')">Home</button>
        <button onclick="history.navigatePush('/about')">About</button>
        <button onclick="history.navigatePush('/private')">Private</button>
        <button onclick="history.navigatePush('/login')">Login</button>

        ${logView()}
      `;
    }

    // ==============================
    // INITIAL
    // ==============================

    history.navigateReplace("/");
  </script>
</body>
</html>
