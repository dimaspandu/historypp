<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mobile Navigation (Push + End Route)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #f5f5f5;
      font-family: sans-serif;
    }

    /* ==============================
       APP CONTAINER
    ============================== */

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;

      width: 100%;
      max-width: 480px;
      margin: 0 auto;

      background: white;
      border-left: 1px solid #ddd;
      border-right: 1px solid #ddd;
    }

    @media (max-width: 480px) {
      .app {
        border: none;
      }
    }

    /* ==============================
       CONTENT
    ============================== */

    #view {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    h2 {
      margin-top: 0;
    }

    .desc {
      color: #666;
      font-size: 14px;
    }

    /* ==============================
       BOTTOM NAV
    ============================== */

    nav {
      display: flex;
      border-top: 1px solid #ddd;
      background: white;
    }

    nav button {
      flex: 1;
      padding: 12px;
      border: none;
      background: white;
      cursor: pointer;
      font-size: 14px;
    }

    nav button.active {
      background: #f0f0f0;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="app">
    <div id="view"></div>

    <nav>
      <button data-link="/">Home</button>
      <button data-link="/about">About</button>
      <button data-link="/transaction">Transaction</button>
      <button data-link="/settings">Settings</button>
    </nav>
  </div>

  <script src="../../src/index.js"></script>
  <script>
    const view = document.getElementById("view");

    history.config({
      base: "/examples/06-end-route"
    });

    // ==============================
    // NAVIGATION (PUSH DEMO)
    // ==============================

    document.querySelectorAll("nav button").forEach(btn => {
      btn.onclick = () => {
        const target = btn.dataset.link;

        // Prevent duplicate push (important for clean demo)
        if (location.pathname.endsWith(target)) return;

        history.navigatePush(target);
      };
    });

    function setActive(path) {
      document.querySelectorAll("nav button").forEach(btn => {
        btn.classList.toggle("active", btn.dataset.link === path);
      });
    }

    function render(title, content) {
      view.innerHTML = `
        <h2>${title}</h2>
        <p>${content}</p>

        <p class="desc">
          Try navigating between tabs using PUSH.<br/>
          Then press browser back.
        </p>
      `;
    }

    // ==============================
    // ROUTES
    // ==============================

    // HOME = END ROUTE
    history.router("/", {
      end: true,
      onMeet() {
        setActive("/");
        render("Home (End Route)", "This is the root screen.");
      }
    });

    history.router("/about", {
      onMeet() {
        setActive("/about");
        render("About", "Information page.");
      }
    });

    history.router("/transaction", {
      onMeet() {
        setActive("/transaction");
        render("Transaction", "Transaction list.");
      }
    });

    history.router("/settings", {
      onMeet() {
        setActive("/settings");
        render("Settings", "Application settings.");
      }
    });

    // ==============================
    // INITIAL SYNC
    // ==============================

    history.navigateReplace(location.pathname);
  </script>
</body>
</html>
