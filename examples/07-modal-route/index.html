<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Modal Route</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
    }

    #view {
      flex: 1;
      padding: 20px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
    }

    /* ==============================
       MODAL
    ============================== */

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms;
    }

    #overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    #modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.95);
      width: 300px;
      background: white;
      border-radius: 10px;
      padding: 20px;
      opacity: 0;
      transition: all 200ms;
    }

    #modal.active {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <h3>Modal Route</h3>
    </header>

    <div id="view"></div>
  </div>

  <!-- Modal -->
  <div id="overlay"></div>

  <div id="modal">
    <h3>Modal</h3>
    <p>This is controlled by route.</p>
    <button id="close">Close</button>
  </div>

  <script type="module" src="../../src/index.js"></script>
  <script type="module">
    const view = document.getElementById("view");
    const overlay = document.getElementById("overlay");
    const modal = document.getElementById("modal");
    const closeBtn = document.getElementById("close");

    history.config({
      base: "/examples/07-modal-route"
    });

    // ==============================
    // UI HELPERS
    // ==============================

    function openModal() {
      overlay.classList.add("active");
      modal.classList.add("active");
    }

    function closeModal() {
      overlay.classList.remove("active");
      modal.classList.remove("active");
    }

    // ==============================
    // ROUTES
    // ==============================

    /**
     * Base page
     */
    history.router("/", {
      onMeet() {
        closeModal();

        view.innerHTML = `
          <h2>Home</h2>
          <p>This page has a modal controlled by route.</p>

          <button id="open">Open Modal</button>
        `;

        document.getElementById("open").onclick = () => {
          history.navigatePush("/modal");
        };
      }
    });

    /**
     * Modal route
     */
    history.router("/modal", {
      onMeet() {
        openModal();
      },

      onExit() {
        // ensure modal closes when leaving
        closeModal();
      }
    });

    // ==============================
    // ACTIONS
    // ==============================

    closeBtn.onclick = () => {
      history.navigatePop();
    };

    overlay.onclick = () => {
      history.navigatePop();
    };

    // ==============================
    // INITIAL SYNC
    // ==============================

    history.navigateReplace(location.pathname);
  </script>
</body>
</html>
