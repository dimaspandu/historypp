<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Multi Step Flow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: white;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px;
      border-bottom: 1px solid #ddd;
    }

    #view {
      flex: 1;
      padding: 20px;
    }

    button {
      padding: 10px 14px;
      margin-top: 10px;
      cursor: pointer;
    }

    .step {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="app">
    <header>
      <h3>Multi Step Flow</h3>
    </header>

    <div id="view"></div>
  </div>

  <script type="module" src="../../src/index.js"></script>
  <script type="module">
    const view = document.getElementById("view");

    history.config({
      base: "/examples/09-multi-step-flow"
    });

    // ==============================
    // FLOW STATE
    // ==============================

    let currentStep = 1;

    function renderStep(title, content, actions) {
      view.innerHTML = `
        <div class="step">Step ${currentStep} / 3</div>
        <h2>${title}</h2>
        <p>${content}</p>
        ${actions}
      `;
    }

    // ==============================
    // ROUTES
    // ==============================

    /**
     * STEP 1
     */
    history.router("/step-1", {
      onArrive() {
        currentStep = 1;
      },

      onMeet() {
        renderStep(
          "Step 1",
          "Enter basic information.",
          `
          <button id="next">Next</button>
          `
        );

        document.getElementById("next").onclick = () => {
          history.navigatePush("/step-2");
        };
      }
    });

    /**
     * STEP 2
     */
    history.router("/step-2", {
      onArrive(ctx) {
        // prevent direct access
        if (currentStep < 1) {
          history.navigateReplace("/step-1");
          return;
        }
        currentStep = 2;
      },

      onMeet() {
        renderStep(
          "Step 2",
          "More details.",
          `
          <button id="back">Back</button>
          <button id="next">Next</button>
          `
        );

        document.getElementById("back").onclick = () => {
          history.navigatePop();
        };

        document.getElementById("next").onclick = () => {
          history.navigatePush("/step-3");
        };
      }
    });

    /**
     * STEP 3
     */
    history.router("/step-3", {
      onArrive() {
        if (currentStep < 2) {
          history.navigateReplace("/step-1");
          return;
        }
        currentStep = 3;
      },

      onMeet() {
        renderStep(
          "Step 3",
          "Confirm your data.",
          `
          <button id="back">Back</button>
          <button id="submit">Submit</button>
          `
        );

        document.getElementById("back").onclick = () => {
          history.navigatePop();
        };

        document.getElementById("submit").onclick = () => {
          history.navigatePush("/success");
        };
      }
    });

    /**
     * SUCCESS
     */
    history.router("/success", {
      end: true,

      onArrive() {
        if (currentStep < 3) {
          history.navigateReplace("/step-1");
          return;
        }
      },

      onMeet() {
        view.innerHTML = `
          <h2>Success</h2>
          <p>Flow completed.</p>
        `;
      }
    });

    // ==============================
    // INITIAL
    // ==============================

    history.navigateReplace("/step-1");
  </script>
</body>
</html>
